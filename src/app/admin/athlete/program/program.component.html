<div>

    <select class="form-control" (change)="getProgram()" [(ngModel)]="programID" style="max-width: 330px;">
        <option value="undefiend">Select program</option>
        <ng-container *ngIf="programs">
            <option *ngFor="let program of programs" [value]="program.id">{{program.title}}</option>
        </ng-container>
    </select>

    <div *ngIf="programDetails" class="mt-3">
        <div *ngFor="let data of programDetails.data; let i =index">
            <!-- <h6 class="page-title">{{program.title}}</h6> -->
            <p>
                <input type="checkbox" [id]="data.id" [checked]="data.ischecked" (change)="update(i , data.id , $event)" > 
                {{data.title}}
            </p>
            </div>
    </div>  
        
</div>
