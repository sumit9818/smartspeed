    <select class="form-control" (change)="getProgram()" [(ngModel)]="programID">
        <option value="undefiend">Select program</option>
        <ng-container *ngIf="programs">
            <option *ngFor="let program of programs" [value]="program.id">{{program.title}}</option>
        </ng-container>
    </select>
    <table class="table" *ngIf="programDetails">
        <thead>
            <tr>
                <th style="width: 70%"> {{ programDetails.title }} </th>
                <th style="text-align: center;border-left: 1px solid #ccc">Tick to Complete</th>
                <th style="text-align: center;border-left: 1px solid #ccc;border-right: 1px solid #ccc">Video</th>
            </tr>
        </thead>
        <tbody>
            <ng-container  *ngFor="let item of programDetails.data;let i = index" >
                <!-- <tr *ngIf="i !=0"><td colspan="3"><hr></td></tr> -->
                <tr>
                    <td style="width: 70%">
                        <div class="d-flex align-items-center ">
                            <b>{{item.instructionTitle}}</b>
                        </div>
                    </td>
                    <td style="border-left: 1px solid #ccc"></td>
                    <td style="border-right: 1px solid #ccc;border-left: 1px solid #ccc"></td>
                </tr>
                <tr *ngFor="let instruction of item.instruction">
                    <td style="width: 70%">{{instruction.title}}</td>
                    <td style="text-align: center;border-left: 1px solid #ccc">
                        <input type="checkbox" [checked]="instruction.status" (change)="update(item._id ,instruction._id, $event )" style="transform: scale(1.5);cursor: pointer;">
                    </td>
                    <td style="text-align: center;border-left: 1px solid #ccc;border-right: 1px solid #ccc">
                        <button class="primary-btn btn-sm" *ngIf="instruction.videoLink != ''" (click)="openModal(VideoModal)">Show Video</button>
                        <!-- <ng-container  *ngIf="instruction.videoLink != ''">
                            <svg class="mr-2" width="18" style="z-index:2;position:relative;cursor:pointer" (click)="openModal(VideoModal)"
                            viewBox="0 0 30.017 30.017" fill="#9ECA01" >
                                <path d="M3,85.333H0v21.012a3,3,0,0,0,3,3H24.013v-3H3Z" transform="translate(0 -79.33)"></path>
                                <path d="M106.345,0H88.335a3,3,0,0,0-3,3v18.01a3,3,0,0,0,3,3h18.01a3,3,0,0,0,3-3V3A3,3,0,0,0,106.345,0ZM94.338,18.76V5.253l9,6.754Z" transform="translate(-79.33)"></path>
                            </svg> 
                        </ng-container> -->
                        <ng-template #VideoModal let-modal>
                            <button type="button" class="close" aria-label="Close" (click)="modal.dismiss('Cross click')">
                                <img src="assets/images/close.svg">
                            </button>
                            <div class="modal-body ">
                                <ng-container *ngIf="videos" >
                                    <ng-container  *ngFor="let video of videos.data">
                                        <div *ngIf="video.id === instruction.videoLink">
                                            <div class="videobox">
                                                <p>{{video.title}}</p>
                                                <video  autoplay poster="{{video.thumbnail_image ? filepath+video.thumbnail_image:''}}" controls="" style="width: 100%;border: 1px solid #ccc;">
                                                    <source [src]="filepath+video.video_url" type="video/mp4">
                                                    <source [src]="filepath+video.video_url" type="video/ogg">
                                                </video>
                                            </div>
                                            <div class="col-sm-12">
                                                {{video.description}}
                                            </div>
                                        </div>
                                    </ng-container>
                                </ng-container>
                            </div>
                        </ng-template>
                    </td>
                </tr>
            </ng-container>
        </tbody>
    </table>
