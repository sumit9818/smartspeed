<div class="row mt-5">
    <div class="col-sm-4">
        <h6>New Athlete's</h6>
        <span *ngIf="athlete">
            <!-- <div *ngIf="PandingAthlete.data.length === 0"> No New Athlete Found</div>   -->
            <div class="newathelete" *ngFor="let athlete of athlete|slice:0:2;">
               <div class="text-right"> <span class="spt-name">{{athlete.sports.name}}</span></div>
                <span>
                    <img src="assets/avtar.jpg" class="upic" *ngIf="!athlete.profile_pic">
                    <img [src]="filepath+athlete.profile_pic" class="upic" *ngIf="athlete.profile_pic">
                    <div>
                        {{athlete.name}} <br>
                        <small>{{athlete.contact}}</small>
                    </div>
                </span>
                <!-- <hr>
                <button class="primary-btn" (click)="openModel(assignCoach , athlete.id)">
                    Select Coach
                </button> -->
            </div>
        
            
        </span>
    </div>

    <div class="col-sm-8"  >
        <div id="container"></div>
    </div>
</div>
