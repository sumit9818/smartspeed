<h5 *ngIf="isAddMode" class="mt-2">Add Video To Library</h5>
<h5 *ngIf="!isAddMode" class="mt-2">Edit Video</h5>


<form [formGroup]="form" (ngSubmit)="onSubmit()" class="row">
    <div class="col-sm-6">
        <label for="isactive">Status</label>
        <select formControlName="isactive" class="form-control">
            <option value="">Select Status</option>
            <option value="true">Active</option>
            <option value="false">Inactive</option>
        </select>

        <label for="title">Video Title</label>
        <input type="text" formControlName="title" class="form-control">

        <div class="filters" >
            <label>Athletes</label>
            <ng-select [items]="athlete" [multiple]="true"
             bindLabel="name" bindValue="id" 
             [(ngModel)]="selectedAthletes" formControlName="athletes"> </ng-select>
        </div>

        <video-upload [(picture)]="picture"  [(loadingfile)]="loadingfile" [(VideoFile)]="VideoFile"></video-upload>
        
        <input type="hidden" formControlName="thumbnail_image" [(ngModel)]="picture">
        <input type="hidden" formControlName="video_url" [(ngModel)]="VideoFile">

    </div>
    <div class="col-sm-6">
        <p><b>Description</b></p>
        <textarea [ngxSummernote]="config" formControlName="description"></textarea>
    </div>

    <div class="mt-2 col-sm-12">
        <button [disabled]="loading || loadingfile" class="secondry-btn">
            <span *ngIf="loading || loadingfile" class="spinner-border spinner-border-sm mr-1"></span>
            Save Details
        </button>
    </div>

</form>
