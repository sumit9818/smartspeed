
<form [formGroup]="form" (ngSubmit)="onSubmit()" class="row">
    <div class="col-sm-12">
        <div class="row">
            <div class="col-sm-6">
                <label for="">Select Assessment</label>
                <select class="color-primary form-control" *ngIf="assessments" (change)="getNumber()" [(ngModel)]="assementModel" formControlName='assessment_id' [ngClass]="{ 'is-invalid': submitted && f.assessment_id.errors }">
                    <option *ngFor="let assessment of assessments.data" [value]="assessment.id">{{assessment.assessment}}</option>
                </select>
            </div>
        
            <div class="col-sm-6">
                <label for="">Date</label> <br>
                <dp-date-picker theme="dp-material" [config]="datePickerConfig"
                formControlName="date" required="true" disabled>
                </dp-date-picker>
            </div>
            <div class="col-sm-12 {{run}}" id="paceCalc">   
                <label for="hours">Calculate Speed </label>
                <div class="row" style="margin:0">
                    <div class="col-sm-6">
                        <!-- <input type="hidden" id="dist" value="{{selectedValue}}" formControlName="time"  > -->
                        <label for="">
                            <svg version="1.1" width="20" x="0px" y="0px" viewBox="0 0 512 512" style="enable-background:new 0 0 512 512;" xml:space="preserve">

                            <path d="M256,0C114.833,0,0,114.833,0,256s114.833,256,256,256s256-114.833,256-256S397.167,0,256,0z M256,472.341c-119.275,0-216.341-97.066-216.341-216.341S136.725,39.659,256,39.659c119.295,0,216.341,97.066,216.341,216.341S375.275,472.341,256,472.341z" />
                        </svg>
                        &nbsp;&nbsp; Time In Seconds</label>
                        <input type="number" class="inputs" [(ngModel)]="secs"  formControlName="time" id="seconds" value="0" class="form-control" (keyup)="init()" />
                    </div>
                    <div class="col-sm-6">
                        <label for="time">

                        &nbsp;&nbsp; 
                        Speed In KM/H </label>
                        <input type="text" formControlName="speed" class="form-control" [(ngModel)]="hours"  [ngClass]="{ 'is-invalid': submitted && f.time.errors }" disabled>
                    </div>
                </div>
                <br>
            </div>

                <input type="text" formControlName="jump" class="form-control" [ngClass]="{ 'is-invalid': submitted && f.time.errors }">
            </div>
        </div>
       

        <div class="row">
            <div class="col-sm-6">
                 <label for="" class="mb-0">Upload Thumbnail</label><br>
                 <div class="progress" *ngIf="progressImage">
                    <div class="progress-bar" [style.width]="progressImage + '%'">{{progressImage}}%</div>
                </div>
                 <label class="video-file" for="thumbnail">
                     <img src="assets/icons/up-bg.svg" class="preview" >
                     <img [src]="filepath" style="width: 100%;height:100%" *ngIf="picture">
                     <input type="file" id="thumbnail" name="videothumb" accept="image/x-png,image/gif,image/jpeg"  (change)="upImageFile($event.target.files[0])">
                 </label>
                 <label class="error" id="thumbnail-error"></label>
             </div>

             <input type="hidden" formControlName="thumbnail_image" [(ngModel)]="picture">
             <input type="hidden" formControlName="video_url" [(ngModel)]="VideoFile">

             <div class="col-sm-6">
                <label for="" class="mb-0">Upload Video</label> <br>
                <div class="progress" *ngIf="progressVideo">
                    <div class="progress-bar" [style.width]="progressVideo + '%'">{{progressVideo}}%</div>
                </div>
                 <label class="video-file" for="video">
                     <video [src]="Videofilepath" style="width: 100%;height:100%" *ngIf="Videofilepath"></video>
                     <img src="assets/icons/up-bg.svg" class="preview">
                     <input type="file" id="video" accept="video/mp4,video/x-m4v,video/*" name="video"   (change)="upVideoFile($event.target.files[0])">
                 </label>
             </div>
         </div>


    </div>
    

    <div class="mt-2 col-sm-12">
        <button [disabled]="loading" class="secondry-btn">
            <span *ngIf="loading" class="spinner-border spinner-border-sm mr-1"></span>
            Save Details
        </button>
    </div>

</form>
