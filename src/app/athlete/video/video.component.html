<main>
    <h6 class="page-title">Video Library
        <a href="javascript:void(0)" (click)=" open(VideoModal)" style="color: black;">
            <img src="assets/icons/add.svg" style="margin-bottom:-5px"> Upload
        </a>
    </h6>
    <div class="row pr-2" *ngIf="videos">
        <div class="col-sm-12">
            <h6 class="color-primary mb-3"   *ngIf="videos.data.videos.length != 0">Recommended  Exercise </h6>
        </div>
        <div class="col-sm-3" *ngFor="let video of videos.data.videos">
            <div class="videobox">
                <a routerLink="{{video.id}}" class="relative">
                    <img [src]="filepath+video.thumbnail_image" *ngIf="video.thumbnail_image">
                    <img src="assets/icons/video.png" *ngIf="!video.thumbnail_image">
                    <p class="v-title">{{video.title}}</p>
                </a>
            </div>
        </div>
    </div>


    <div class="row pr-2" *ngIf="videos">
        <div class="col-sm-12" *ngIf="videos.data.my_videos">
            <h6 class="color-primary mt-4 mb-3"  *ngIf="videos.data.my_videos.length != 0">My Videos <svg width="69" height="1" viewBox="0 0 69 1"><line x2="69" transform="translate(0 0.5)" fill="none" stroke="#dadada" stroke-width="1"></line></svg> </h6>
        </div>
        <div class="col-sm-3"  *ngFor="let video of videos.data.my_videos">
            <div class="videobox">
                <div class="relative">
                    <div class="v-btn">
                        <a routerLink="{{video.id}}">
                            <svg width="20.379" viewBox="0 0 22.379 16.959"><g transform="translate(0 -62.003)"><g transform="translate(9.529 68.778)"><circle cx="1.705" cy="1.705" r="1.705" fill="#2b343b"></circle></g><g transform="translate(6.251 65.5)"><g transform="translate(0 0)"><path d="M148,142a4.983,4.983,0,1,0,4.983,4.983A4.988,4.988,0,0,0,148,142Zm0,8.217a3.234,3.234,0,1,1,3.234-3.234A3.238,3.238,0,0,1,148,150.219Z" transform="translate(-143.014 -142.002)" fill="#2b343b"></path></g></g><g transform="translate(0 62.003)"><g transform="translate(0 0)"><path d="M21.813,68.574a16.9,16.9,0,0,0-3.906-4.136A11.122,11.122,0,0,0,11.209,62a11.179,11.179,0,0,0-6.7,2.428,17.019,17.019,0,0,0-3.93,4.131,3.492,3.492,0,0,0,0,3.841A17.018,17.018,0,0,0,4.5,76.534a11.179,11.179,0,0,0,6.7,2.428,12.124,12.124,0,0,0,8.084-3.6.874.874,0,0,0-1.2-1.275,10.425,10.425,0,0,1-6.888,3.127c-4.244,0-7.763-3.628-9.173-5.772a1.745,1.745,0,0,1,0-1.919c1.41-2.144,4.929-5.772,9.173-5.772s7.741,3.631,9.139,5.777a1.749,1.749,0,0,1,0,1.908.874.874,0,0,0,1.465.954A3.5,3.5,0,0,0,21.813,68.574Z" transform="translate(0 -62.003)" fill="#2b343b"></path></g></g></g></svg>
                        </a>
                        <button  (click)="deleteVideo(video.id);$event.stopPropagation()" [disabled]="video.isDeleting">
                            <svg width="15.632" height="17.569" viewBox="0 0 15.632 17.569"><g transform="translate(0.2 0.2)"><g transform="translate(0 0)"><path d="M72.6,114.908H61.461a.44.44,0,0,0-.33.11.374.374,0,0,0-.11.33l1.145,9.971a2.179,2.179,0,0,0,2.179,1.915h5.547a2.179,2.179,0,0,0,2.2-1.981l.946-9.949a.374.374,0,0,0-.11-.286A.44.44,0,0,0,72.6,114.908Zm-1.387,10.3a1.277,1.277,0,0,1-1.321,1.145H64.344a1.255,1.255,0,0,1-1.3-1.123l-1.1-9.443H72.114Z" transform="translate(-59.414 -110.065)" fill="#fc1919" stroke="red" stroke-width="0.4"></path><path d="M37.784,1.981H33.25v-.7A1.233,1.233,0,0,0,32.063,0h-2.84a1.233,1.233,0,0,0-1.255,1.21q0,.033,0,.067v.7H23.433a.44.44,0,1,0,0,.88H37.784a.44.44,0,1,0,0-.88Zm-5.415-.7v.7H28.848v-.7a.352.352,0,0,1,.374-.4H32a.352.352,0,0,1,.376.326A.348.348,0,0,1,32.37,1.277Z" transform="translate(-22.993 0)" fill="#fc1919" stroke="red" stroke-width="0.4"></path></g></g></svg>
                        </button>
                    </div>
                    <img [src]="filepath+video.thumbnail_image" *ngIf="video.thumbnail_image">
                    <img src="assets/icons/video.png" *ngIf="!video.thumbnail_image">
                </div>
                <p class="v-title">{{video.title}}</p>
            </div>
        </div>



    </div>
</main>

<ng-template #VideoModal let-modal>
    <button type="button" class="close" aria-label="Close" (click)="modal.dismiss('Cross click')">
            <img src="assets/images/close.svg">
      </button>
    <div class="modal-header">
        <h6 class="modal-title">Add Video</h6>
    </div>
    <div class="modal-body">
        <app-addvideo></app-addvideo>
    </div>
</ng-template>
